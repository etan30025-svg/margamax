<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Margan Max</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #25D366;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #25D366;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #1ebe5d;
    }
  </style>
</head>
<body>

<header>
  <h1>Margan Max</h1>
  <p>Layanan Online Resmi Mar</p>
</header>

<div class="container">
  <div class="card">
    <h2>Form Hubungi Kami</h2>
    <input type="text" id="nama" placeholder="Nama Anda">
    <textarea id="pesan" rows="5" placeholder="Tulis pesan Anda..."></textarea>
    <button onclick="kirimWhatsApp()">Kirim ke WhatsApp</button>
  </div>
</div>

<script>
  function kirimWhatsApp() {
    let nama = document.getElementById('nama').value;
    let pesan = document.getElementById('pesan').value;

    if(nama === '' || pesan === '') {
      alert('Nama dan pesan wajib diisi!');
      return;
    }

    let nomor = '6281234567890'; // GANTI dengan nomor WhatsApp Anda
    let text = `Halo, saya ${nama}. %0A${pesan}`;

    let url = `https://wa.me/${nomor}?text=${text}`;

    window.open(url, '_blank');
  }
</script>

</body>
</html>
